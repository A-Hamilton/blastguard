# SWE-agent v1 bundle declaring the three BlastGuard MCP tools.
# Referenced from a run config's `agent.tools.bundles` list (path-based).
# Shape matches tools/edit_anthropic/config.yaml in the SWE-agent repo.
#
# NOTE: SWE-agent passes docstrings through Python's str.format(). Any literal
# curly brace must be doubled ({{ }}) to escape the placeholder semantics, or
# the tool-registration step fails with KeyError. This is why the JSON-example
# fragments below use {{ and }} instead of { and }.

tools:
  blastguard_search:
    signature: |
      blastguard_search <json_query>
    docstring: >
      Query AST code graph. query values (Phase 1): 'outline of PATH',
      'find NAME', 'callers of NAME' (same-file only), 'exports of PATH',
      'libraries'. For cross-file dependency work, prefer grep.
    arguments:
      - name: json_query
        type: string
        description: "Single-quoted JSON with a 'query' key."
        required: true

  blastguard_apply_change:
    signature: |
      blastguard_apply_change <json_changes>
    docstring: >
      Apply edits to a file with same-file cascade warnings
      (SIGNATURE / ASYNC_CHANGE / ORPHAN / INTERFACE_BREAK).
    arguments:
      - name: json_changes
        type: string
        description: "Single-quoted JSON with 'file' and 'changes' keys."
        required: true

  blastguard_run_tests:
    signature: |
      blastguard_run_tests <json_opts>
    docstring: >
      Run tests (auto-detects pytest/jest/cargo). Failures are annotated
      with "YOU MODIFIED X" for recently-edited symbols.
    arguments:
      - name: json_opts
        type: string
        description: "Single-quoted JSON, 'path' key optional."
        required: false
